name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        shell: bash
        run: |
          mkdir -p dist release
          name="image2-mcp_${{ matrix.goos }}_${{ matrix.goarch }}"
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
          fi
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -o "dist/image2-mcp${ext}" ./cmd/image2-mcp
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist && zip "../release/${name}.zip" "image2-mcp${ext}")
          else
            tar -czf "release/${name}.tar.gz" -C dist image2-mcp
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
